<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>王淼的个人主页</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hero {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3rem;
            padding: 3rem 1rem;
            background: linear-gradient(135deg, #1e88e5, #42a5f5);
            color: white;
            border-radius: 15px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .avatar {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
        }
        .hero-text {
            text-align: center;
        }
        .motto {
            font-style: italic;
            margin-top: 1rem;
            opacity: 0.9;
        }
    </style>

<body>
    <nav>
        <ul>
            <li><a href="index.html">首页</a></li>
            <li><a href="about.html">关于我</a></li>
            <li><a href="photos.html">我的摄影</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="hero">
            <img src="images/avatar.jpg" alt="头像" class="avatar">
            <div class="hero-text">
                <h1>你好，我是王淼 👋</h1>
                <p>齐鲁工业大学 · 软件工程24级</p>
                <p class="motto">该吃吃该喝喝，遇事别往心里搁</p>
            </div>
        </div>

        <div class="card">
            <h2>网站介绍</h2>
            <p>这是前端设计与开发实验作品，使用HTML+CSS搭建。</p>
        </div>

        <div class="card">
            <h2>我的爱好</h2>
            <ul class="hobby-list">
                <li>📷 摄影</li>
                <li>📚 看书</li>

        </div>

</html>
